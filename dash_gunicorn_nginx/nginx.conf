# ============================================================
# nginx — reverse proxy in front of Gunicorn (Dash app)
# ============================================================
# nginx here does NOT perform auth itself — the underlying Flask
# server (wrapped by Dash) handles the full OIDC Authorization
# Code + PKCE flow against Mock Entra ID. nginx's job is TLS
# termination, static caching, and being the single entry point.
#
# Dash-specific notes:
#   - Dash's internal API (_dash-update-component, _dash-layout,
#     _dash-dependencies) is just more Flask routes on the same
#     server — no special handling needed beyond a sane body size
#     limit for callback payloads.
# ============================================================

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile     on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    upstream dash_app {
        server app:8080;     # Docker Compose service name
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Static assets — cached, served directly by nginx ────
        location /static/ {
            alias /usr/share/nginx/static/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # ── Health check (bypasses app for fast LB probes) ──────
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Everything else → Gunicorn/Flask ─────────────────────
        location / {
            proxy_pass         http://dash_app;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Cookies & redirects pass through untouched so the
            # Flask session cookie and OIDC redirect chain work.
            proxy_redirect off;

            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }

    # ── Optional: HTTPS termination ───────────────────────────
    # server {
    #     listen 443 ssl;
    #     server_name localhost;
    #     ssl_certificate     /etc/nginx/certs/server.crt;
    #     ssl_certificate_key /etc/nginx/certs/server.key;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #
    #     location / {
    #         proxy_pass http://dash_app;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Real-IP         $remote_addr;
    #         proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #     }
    # }
}
