worker_processes auto;

# Lua package path - adjust if using OpenResty or custom install
env LUA_PATH;
env LUA_CPATH;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # -----------------------------------------------------------------------
    # Lua / OpenResty shared memory zones
    # -----------------------------------------------------------------------

    # Session cache (lua-resty-session)
    lua_shared_dict discovery   1m;   # OIDC discovery document cache
    lua_shared_dict jwks        1m;   # JWK key set cache
    lua_shared_dict introspection 10m; # Token introspection cache (optional)

    # lua-resty-openidc internals
    lua_shared_dict openidc_cache 10m;

    # -----------------------------------------------------------------------
    # SSL (recommended even for internal traffic)
    # -----------------------------------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # -----------------------------------------------------------------------
    # Upstream: Gunicorn / Flask
    # -----------------------------------------------------------------------
    upstream flask_app {
        server 127.0.0.1:8000;   # adjust host:port to match your gunicorn bind
        keepalive 32;
    }

    # -----------------------------------------------------------------------
    # Server block
    # -----------------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name your.domain.example.com;  # <-- CHANGE THIS

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # Location of the Lua configuration helper
        set $config_file /etc/nginx/conf.d/oidc_config.lua;

        # ------------------------------------------------------------------
        # Protected application routes
        # ------------------------------------------------------------------
        location / {
            # Run OIDC authentication check
            access_by_lua_file /etc/nginx/conf.d/oidc_access.lua;

            # Forward the validated identity to Flask
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header Host               $host;

            # Headers populated by oidc_access.lua after successful auth
            proxy_set_header X-Auth-User        $http_x_auth_user;
            proxy_set_header X-Auth-Email       $http_x_auth_email;
            proxy_set_header X-Auth-Roles       $http_x_auth_roles;
            proxy_set_header X-Access-Token     $http_x_access_token;

            proxy_pass http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ------------------------------------------------------------------
        # OIDC redirect / callback URI
        # Must match "redirect_uri" registered in Entra ID app registration
        # ------------------------------------------------------------------
        location /oidc/callback {
            access_by_lua_file /etc/nginx/conf.d/oidc_access.lua;
            proxy_pass http://flask_app;
        }

        # ------------------------------------------------------------------
        # Logout endpoint
        # ------------------------------------------------------------------
        location /oidc/logout {
            access_by_lua_file /etc/nginx/conf.d/oidc_logout.lua;
        }

        # ------------------------------------------------------------------
        # Health / readiness probe (unauthenticated)
        # ------------------------------------------------------------------
        location /health {
            access_log off;
            return 200 "ok\n";
        }
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name your.domain.example.com;  # <-- CHANGE THIS
        return 301 https://$host$request_uri;
    }
}
