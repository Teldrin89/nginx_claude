# ==============================================================================
# app.conf  –  Protected application server block
# Requires:  OpenResty with lua-resty-openidc  (bare-metal / VM install)
# Upstream:  Gunicorn WSGI server via UNIX socket
#
# TLS topology:
#   Internet → Azure Application Gateway (HTTPS/443, TLS termination)
#           → OpenResty (HTTP/80, plain, private network only)
#           → Gunicorn (UNIX socket)
#
# nginx never terminates TLS here. The Application Gateway is the sole
# TLS endpoint. nginx trusts X-Forwarded-Proto/For/Host from the gateway
# and rewrites OIDC redirect URIs to use https:// for Entra ID.
# ==============================================================================

# ------------------------------------------------------------------------------
# Upstream pool – Gunicorn via UNIX domain socket (same host)
# ------------------------------------------------------------------------------
upstream gunicorn {
    server unix:/run/gunicorn/gunicorn.sock fail_timeout=10s;
    keepalive 32;
}

# ------------------------------------------------------------------------------
# Real-IP restoration
# Declare the Application Gateway's private subnet so nginx logs and
# Lua code see the original client IP rather than the gateway's IP.
# Replace with your actual Application Gateway subnet CIDR(s).
# ------------------------------------------------------------------------------
geo $trusted_gateway {
    default          0;
    10.0.1.0/24      1;   # Application Gateway subnet – replace with your CIDR
    # 10.0.2.0/24   1;   # add more CIDRs if needed
}

server {
    # Listen on HTTP only – TLS is terminated at the Application Gateway
    listen      80;
    server_name YOUR_APP_DOMAIN;

    # ------------------------------------------------------------------
    # Restrict access to the Application Gateway subnet only.
    # Direct internet traffic to port 80 is blocked here; the gateway's
    # NSG / firewall rules should enforce this at the network layer too.
    # ------------------------------------------------------------------
    if ($trusted_gateway = 0) {
        return 444;   # drop connection silently for untrusted sources
    }

    # ------------------------------------------------------------------
    # Restore real client IP from the gateway's X-Forwarded-For header
    # ------------------------------------------------------------------
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from  10.0.1.0/24;   # must match Application Gateway subnet

    # ------------------------------------------------------------------
    # Reconstruct the public-facing scheme and host that Entra ID sees.
    # The gateway terminates HTTPS, so $scheme here is always "http".
    # We use the forwarded values so OIDC redirect URIs and cookie
    # Secure flags reference the correct public https:// origin.
    # ------------------------------------------------------------------
    set $public_scheme "https";
    set $public_host   $http_x_forwarded_host;

    # Fall back to Host header if the gateway does not send X-Forwarded-Host
    if ($public_host = "") {
        set $public_host $http_host;
    }

    # ------------------------------------------------------------------
    # Security headers
    # (HSTS is set here so it reaches the browser via the gateway)
    # ------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           "no-referrer-when-downgrade"          always;

    # Allow reasonably large file uploads (tune to your app's needs)
    client_max_body_size 20m;

    # ------------------------------------------------------------------
    # Static files served directly by nginx (bypasses Gunicorn entirely)
    # ------------------------------------------------------------------
    location /static/ {
        alias /opt/app/staticfiles/;
        expires    30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    location /media/ {
        alias /opt/app/media/;
        expires    7d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ------------------------------------------------------------------
    # OIDC Callback endpoint
    # Entra ID redirects here with ?code=... after authentication.
    # The redirect_uri must use https:// (the public gateway address).
    # ------------------------------------------------------------------
    location = /oidc/callback {
        access_by_lua_block {
            local oidc = require("resty.openidc")
            local opts = {
                redirect_uri          = ngx.var.oidc_redirect_uri,
                discovery             = "https://login.microsoftonline.com/" ..
                                        ngx.var.oidc_tenant_id ..
                                        "/v2.0/.well-known/openid-configuration",
                client_id             = ngx.var.oidc_client_id,
                client_secret         = ngx.var.oidc_client_secret,
                scope                 = ngx.var.oidc_scopes,
                session_contents      = { id_token = true, access_token = true },
                ssl_verify            = "yes",
            }
            local res, err = oidc.authenticate(opts)
            if err then
                ngx.status = 500
                ngx.log(ngx.ERR, "OIDC callback error: ", err)
                ngx.exit(ngx.HTTP_INTERNAL_SERVER_ERROR)
            end
        }
        return 302 /;
    }

    # ------------------------------------------------------------------
    # Logout endpoint
    # ------------------------------------------------------------------
    location = /oidc/logout {
        access_by_lua_block {
            local session = require("resty.session")
            local s       = session.open()
            s:destroy()

            local logout_url = "https://login.microsoftonline.com/" ..
                               ngx.var.oidc_tenant_id ..
                               "/oauth2/v2.0/logout?post_logout_redirect_uri=" ..
                               ngx.escape_uri(ngx.var.oidc_logout_redirect)
            ngx.redirect(logout_url)
        end
    }

    # ------------------------------------------------------------------
    # Protected application routes
    # ------------------------------------------------------------------
    location / {
        access_by_lua_block {
            local oidc = require("resty.openidc")
            local opts = {
                redirect_uri          = ngx.var.oidc_redirect_uri,
                discovery             = "https://login.microsoftonline.com/" ..
                                        ngx.var.oidc_tenant_id ..
                                        "/v2.0/.well-known/openid-configuration",
                client_id             = ngx.var.oidc_client_id,
                client_secret         = ngx.var.oidc_client_secret,
                scope                 = ngx.var.oidc_scopes,
                session_contents      = { id_token = true, access_token = true },
                ssl_verify            = "yes",
                renew_access_token_on_expiry = true,
            }

            local res, err = oidc.authenticate(opts)
            if err then
                ngx.status = 401
                ngx.log(ngx.ERR, "OIDC auth error: ", err)
                ngx.exit(ngx.HTTP_UNAUTHORIZED)
            end

            if res then
                ngx.req.set_header("X-Auth-User",  res.id_token.preferred_username or "")
                ngx.req.set_header("X-Auth-Name",  res.id_token.name              or "")
                ngx.req.set_header("X-Auth-Email", res.id_token.email             or "")
                ngx.req.set_header("X-Auth-Roles", table.concat(
                    res.id_token.roles or {}, ","))
            end
        }

        # ------------------------------------------------------------------
        # Proxy to Gunicorn
        # ------------------------------------------------------------------
        proxy_pass         http://gunicorn;
        proxy_http_version 1.1;

        # Forward the original public host and scheme to the app.
        # Django's ProxyFix / Flask's ProxyFix reads these.
        proxy_set_header   Host              $public_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $public_scheme;
        proxy_set_header   X-Forwarded-Host  $public_host;

        proxy_set_header   Connection        "";
        proxy_set_header   Expect            "";

        proxy_connect_timeout  10s;
        proxy_send_timeout     75s;
        proxy_read_timeout     75s;

        proxy_buffering         on;
        proxy_buffer_size       8k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_intercept_errors  off;
    }
}
