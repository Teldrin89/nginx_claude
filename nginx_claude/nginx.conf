worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log the real client IP (restored from X-Forwarded-For by set_real_ip_from)
    log_format main '$remote_addr ($http_x_forwarded_for) - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # --- Shared memory zones for OIDC state ---
    lua_shared_dict oidc_cache    10m;
    lua_shared_dict sessions      10m;

    # Lua package path
    lua_package_path '${prefix}/lua/?.lua;;';

    include /etc/nginx/conf.d/*.conf;
}
