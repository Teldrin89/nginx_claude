# ==============================================================================
# oidc_entra.conf  –  Microsoft Entra ID (Azure AD) OIDC integration
# Place this file in /etc/nginx/conf.d/
#
# Note on scheme: nginx listens on plain HTTP (TLS terminated at the
# Application Gateway). All redirect URIs and post-logout URIs must still
# reference https:// because that is the public-facing URL Entra ID sees.
# ==============================================================================

# ------------------------------------------------------------------------------
# OIDC Provider Settings (Microsoft Entra ID)
# Replace the placeholders with your actual tenant and app values.
# ------------------------------------------------------------------------------

# Your Azure AD / Entra ID Tenant ID (GUID or primary domain)
map $host $oidc_tenant_id {
    default "YOUR_TENANT_ID";          # e.g. "contoso.onmicrosoft.com" or a GUID
}

# Application (Client) ID registered in Entra ID
map $host $oidc_client_id {
    default "YOUR_CLIENT_ID";
}

# Client Secret generated in the Entra ID App Registration → Certificates & Secrets
# For production, load this from an environment variable or secret manager:
#   lua_code_cache off;  (dev only)
#   set_by_lua $oidc_client_secret 'return os.getenv("ENTRA_CLIENT_SECRET")';
map $host $oidc_client_secret {
    default "YOUR_CLIENT_SECRET";
}

# Redirect URI — must be registered in Entra ID App Registration → Redirect URIs
map $host $oidc_redirect_uri {
    default "https://YOUR_APP_DOMAIN/oidc/callback";
}

# Scopes to request (space-separated)
map $host $oidc_scopes {
    default "openid profile email";
}

# Microsoft Entra ID OIDC endpoints for your tenant
map $host $oidc_auth_endpoint {
    default "https://login.microsoftonline.com/YOUR_TENANT_ID/oauth2/v2.0/authorize";
}

map $host $oidc_token_endpoint {
    default "https://login.microsoftonline.com/YOUR_TENANT_ID/oauth2/v2.0/token";
}

# JWKS URI — used to validate JWT signatures
map $host $oidc_jwks_uri {
    default "https://login.microsoftonline.com/YOUR_TENANT_ID/discovery/v2.0/keys";
}

# OpenID Connect discovery document (for reference / automatic config)
# https://login.microsoftonline.com/YOUR_TENANT_ID/v2.0/.well-known/openid-configuration

# Cookie name used to store the session token
map $host $oidc_cookie_name {
    default "EntraSession";
}

# Post-logout redirect URI
map $host $oidc_logout_redirect {
    default "https://YOUR_APP_DOMAIN/";
}
